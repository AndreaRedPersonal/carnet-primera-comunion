<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnet Primera Comunión</title>
  
<style>
body{
  margin:0;
  font-family:Montserrat;
  background:#f5f5f5;
}

.contenedor{
  display:flex;
  justify-content:center;
  gap:80px;
  padding:50px;
}

.lado-izq{
  width:400px;
}

.lado-der{
  width:800px;
}

.logo{
  width:200px;
  margin-bottom:30px;
}

.pregunta{
  display:flex;
  gap:15px;
  margin-bottom:30px;
}

.numero{
  min-width:35px;
  height:35px;
  background:#e53935;
  color:white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:14px;
}

input[type="text"]{
  width:100%;
  border:none;
  border-bottom:2px solid #ccc;
  padding:8px;
  font-size:16px;
}

.zona-foto{
  border:2px dashed #4caf50;
  padding:30px;
  border-radius:15px;
  background:#e8f5e9;
}

.titulo-box{
  background:#e53935;
  color:white;
  padding:15px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}

.subtexto{
  text-align:center;
  font-size:14px;
  margin-bottom:20px;
}

.foto{
  width:150px;
  height:150px;
  border-radius:50%;
  overflow:hidden;
  position:absolute;
  top:180px;
  left:75px;
}

.foto{
  width:200px;
  height:200px;
  border-radius:50%;
  overflow:hidden;
  position:absolute;
  top:160px;
  left:57px;
}
.foto img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.slider-box{
  margin-top:20px;
  text-align:center;
}

.guardar{
  width:100%;
  margin-top:20px;
  padding:12px;
  background:#e53935;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
.nombre{
  position:absolute;
  bottom:45px;
  left:100px;
  width:200px;
  text-align:center;
  font-weight:500;
  font-size:14px;
  color:#333;
}

.catequista{
  position:absolute;
  bottom:15px;
  left:100px;
  width:200px;
  text-align:center;
  font-size:14px;
  color:#333;
}
/* CONTENEDOR 3D */
.carnet-container{
  display:flex;
  gap:30px;
  justify-content:center;
}
/* TARJETA */
.carnet{
  width:300px;
  height:500px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.8s;
  border-radius:15px;
}

/* CUANDO GIRA */

/* CARAS */
.cara{
  width:300px;
  height:500px;
  position:relative;
  border-radius:15px;
  overflow:hidden;
}

/* FRENTE */
.frente{
  background-image:url('carnet.png');
  background-size:cover;
}

/* ATRÁS */
.atras{
  background-image:url('carnet-atras.png');
  background-size:cover;
}
.qr-box{
  position:absolute;
  top:380px;
  left:110px;
  width:100px;
  height:100px;
}
.datos-atras{
position:absolute;
top:58px;
left:110px;
width:200px;
text-align:left;
font-size:14px;
color:#333;
}
</style>
</head>

<body>

<div class="contenedor">

  <!-- IZQUIERDA -->
  <div class="lado-izq">

    <img src="logo.png" class="logo">

    <div class="pregunta">
      <div class="numero">1</div>
      <div>
        <p>¿Cuál es tu nombre completo?</p>
        <input type="text" id="nombre">
      </div>
    </div>

    <div class="pregunta">
      <div class="numero">2</div>
      <div>
        <p>¿Cuál es tu DNI?</p>
        <input type="text" id="dni">
      </div>
    </div>

    <div class="pregunta">
      <div class="numero">3</div>
      <div>
        <p>¿Nombre del padre/madre o apoderado?</p>
        <input type="text" id="padre">
      </div>
    </div>

    <div class="pregunta">
      <div class="numero">4</div>
      <div>
        <p>¿Cuál es el teléfono de tu padre o apoderado?</p>
        <input type="text" id="telefono">
      </div>
    </div>

    <div class="pregunta">
      <div class="numero">5</div>
      <div>
        <p>Sube tu mejor foto</p>

        <div class="zona-foto">
          <input type="file" id="fotoInput">
        </div>

      </div>
    </div>

  </div>


  <!-- DERECHA -->
  <div class="lado-der">

    <div class="titulo-box">
      Genera tu carnet aquí
    </div>

    <p class="subtexto">
      ¡Llena los datos correctamente, sube tu foto y listo!
    </p>

<div class="carnet-container" id="carnet">

  <!-- CARNET FRENTE -->
  <div class="cara frente">
    <div class="foto">
      <img id="previewFoto">
    </div>
    <div class="nombre" id="previewNombre"></div>
    <div class="catequista" id="previewCatequista"></div>
  </div>

  <!-- CARNET ATRÁS -->
  <div class="cara atras">

<div class="datos-atras">
<p id="previewPadre"></p>
<p id="previewTelefono"></p>
</div>

    <div class="qr-box">
      <div id="qrcode"></div>
    </div>
  </div>

</div>


<div class="slider-box">
<p>Ajusta el tamaño de tu foto</p>
<input type="range" id="zoom" min="1" max="2" step="0.1" value="1">
</div>

<button class="guardar" onclick="guardarCarnet()">¡Guardar mi carnet!</button>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

// Vista previa nombre
document.getElementById("nombre").addEventListener("input", function(){

  const nombre = this.value;

  document.getElementById("previewNombre").innerText =
  nombre.toUpperCase();

});

// Vista previa DNI
document.getElementById("dni").addEventListener("input", function(){
  document.getElementById("previewCatequista").innerText =
  this.value;
});

// Vista previa foto
document.getElementById("fotoInput").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(){
    document.getElementById("previewFoto").src = reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

// Zoom foto
document.getElementById("zoom").addEventListener("input", function(){
  document.getElementById("previewFoto").style.transform =
  "scale(" + this.value + ")";
});

// Nombre del padre
document.getElementById("padre").addEventListener("input", function(){
  document.getElementById("previewPadre").innerText = this.value;
});

// Teléfono
document.getElementById("telefono").addEventListener("input", function(){
  document.getElementById("previewTelefono").innerText = this.value;
});

// Actualiza el nombre y genera el QR
document.getElementById("nombre").addEventListener("input", function(){
  document.getElementById("previewNombre").innerText = this.value.toUpperCase();
  generarQR(); // Llamamos a la función
});

// NUEVO: Agrega esto para que el QR también se cree al escribir el DNI
document.getElementById("dni").addEventListener("input", function(){
  document.getElementById("previewCatequista").innerText = this.value;
  generarQR(); // Llamamos a la función
});
// Giro del carnet

function generarQR() {
  const dni = document.getElementById("dni").value;
  const nombre = document.getElementById("nombre").value;
  const miUrl = "https://script.google.com/macros/s/AKfycbwpQJqz9pnXTSsvfgUp6LuY7IRslhJKDSliTJS77c_Q1jG-81Hx0U28xZJD5UU354OjPg/exec"; 
  const enlace = miUrl + "?dni=" + dni + "&nombre=" + encodeURIComponent(nombre);

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: enlace,
    width: 300,  // Generamos a 300px (mucha calidad)
    height: 300, // Aunque el CSS lo vea de 120px
    correctLevel : QRCode.CorrectLevel.H
  });

  // Este truco ayuda a que el QR se adapte al contenedor pequeño sin perder calidad
  setTimeout(() => {
     const qrImg = document.querySelector("#qrcode img");
     if(qrImg) {
       qrImg.style.width = "100%";
       qrImg.style.height = "100%";
     }
  }, 50);
}
function guardarCarnet() {
  const boton = document.querySelector(".guardar");
  boton.innerText = "Guardando... espere";
  boton.disabled = true;

  // Usamos html2canvas para convertir el DIV en imagen
  // Agregamos opciones para mejorar la calidad y evitar errores de carga
  html2canvas(document.getElementById("carnet"), {
    useCORS: true,
    scale: 4 // Mayor resolución
  }).then(canvas => {
    
    let imagen = canvas.toDataURL("image/png");
    let dni = document.getElementById("dni").value;

    if(!dni) {
      alert("Por favor, ingresa el DNI antes de guardar.");
      boton.disabled = false;
      boton.innerText = "¡Guardar mi carnet!";
      return;
    }

    // REEMPLAZA ESTA URL con la que copiaste de Google Apps Script
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzNaq68U8NHoQAQszgqAHfwQ-Ds1HMd_uy_R1Y1V8hjdVIq541gJbLHVRdO_ab31uINww/exec";

    fetch(URL_SCRIPT, {
      method: "POST",
      body: JSON.stringify({
        imagen: imagen,
        dni: dni
      })
    })
    .then(res => res.json())
    .then(response => {
      if(response.status === "success") {
        alert("¡Carnet guardado con éxito en tu Google Drive!");
      } else {
        alert("Error al guardar: " + response.message);
      }
    })
    .catch(error => {
      console.error("Error:", error);
      alert("Hubo un error en la conexión.");
    })
    .finally(() => {
      boton.disabled = false;
      boton.innerText = "¡Guardar mi carnet!";
    });
  });
}

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>

</html>
